<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Milestones — After Hours | 1999</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap">
    <link rel="stylesheet" href="/style.css?v=33">
    <link rel="stylesheet" href="/admin.css?v=10">
</head>
<body data-page="afterhours" class="auth-hidden">

<div class="card">
    <img src="/whale_transparent.png" class="whale-bg" alt="" aria-hidden="true" decoding="async">

    <!-- ── Page header ─────────────────────────────────────────── -->
    <div class="aa-page-header">
        <h1>1999</h1>
        <div class="sub">Milestones</div>
    </div>

    <!-- ── Overall progress ────────────────────────────────────── -->
    <div class="ms-summary">
        <div class="ms-summary-counts">
            <span id="ms-done" class="ms-summary-done">—</span>
            <span class="ms-summary-sep"> / </span>
            <span id="ms-total" class="ms-summary-total">—</span>
            <span class="ms-summary-label">達成</span>
        </div>
        <div class="ms-bar-wrap" role="progressbar" aria-valuemin="0" aria-valuemax="100">
            <div id="ms-fill" class="ms-bar-fill"></div>
        </div>
        <div id="ms-pct" class="ms-pct">—</div>
    </div>

    <!-- ── Loading / error ─────────────────────────────────────── -->
    <div id="ms-loading" class="ms-state">
        <span class="ms-state-text">読み込み中…</span>
    </div>
    <div id="ms-error" class="ms-state" hidden>
        <span class="ms-state-text">データの取得に失敗しました。</span>
    </div>

    <!-- ── Milestone categories (rendered by milestones.js) ────── -->
    <div id="ms-container"></div>

    <div class="admin-footer">
        <a href="/afterhours" class="back-home">← Back</a>
        <button class="admin-signout" id="signout-btn">Sign out</button>
    </div>
</div>

<script src="/whale.js"></script>
<script src="/script.js?v=3"></script>
<script src="/admin.js?v=3"></script>
<script src="/milestones.js?v=1"></script>
</body>
</html>
