<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics — After Hours | 1999</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap">
    <link rel="stylesheet" href="/style.css?v=33">
    <link rel="stylesheet" href="/admin.css?v=3">
</head>
<body data-page="afterhours-analytics" class="auth-hidden">

<div class="card">
    <img src="/whale_transparent.png" class="whale-bg" alt="" aria-hidden="true" decoding="async">

    <div class="aa-page-header">
        <h1>1999</h1>
        <div class="sub">Analytics</div>
    </div>

    <!-- Loading / error -->
    <div id="aa-loading" class="aa-loading">読み込み中…</div>

    <!-- Dashboard (hidden until data loads) -->
    <div id="aa-content">

        <!-- TODAY ─────────────────────────────────────────────────────── -->
        <div class="aa-section">
            <div class="aa-section-header">
                <span class="aa-section-label">Today</span>
                <button class="aa-refresh-btn" id="aa-refresh" type="button">↻ Refresh</button>
            </div>
            <div class="aa-grid">
                <div class="aa-card">
                    <div class="aa-value" id="aa-today-visitors">—</div>
                    <div class="aa-card-label">Visitors</div>
                </div>
                <div class="aa-card">
                    <div class="aa-value" id="aa-today-new">—</div>
                    <div class="aa-card-label">New Visitors</div>
                </div>
                <div class="aa-card">
                    <div class="aa-value" id="aa-today-returning">—</div>
                    <div class="aa-card-label">Returning</div>
                </div>
                <div class="aa-card">
                    <div class="aa-value" id="aa-today-return-rate">—</div>
                    <div class="aa-card-label">Return Rate</div>
                </div>
                <div class="aa-card">
                    <div class="aa-value" id="aa-today-music">—</div>
                    <div class="aa-card-label">Music Plays</div>
                </div>
                <div class="aa-card">
                    <div class="aa-value" id="aa-today-diary">—</div>
                    <div class="aa-card-label">Diary Views</div>
                </div>
                <div class="aa-card aa-card--wide">
                    <div class="aa-value" id="aa-today-live">—</div>
                    <div class="aa-card-label">Live Views</div>
                </div>
            </div>
        </div>

        <!-- THIS WEEK ──────────────────────────────────────────────────── -->
        <div class="aa-section">
            <div class="aa-section-header">
                <span class="aa-section-label">This Week</span>
            </div>
            <div class="aa-grid">
                <div class="aa-card">
                    <div class="aa-value" id="aa-week-visitors">—</div>
                    <div class="aa-card-label">Visitors</div>
                </div>
                <div class="aa-card">
                    <div class="aa-value" id="aa-week-music">—</div>
                    <div class="aa-card-label">Music Plays</div>
                </div>
            </div>
        </div>

        <!-- THIS MONTH ─────────────────────────────────────────────────── -->
        <div class="aa-section">
            <div class="aa-section-header">
                <span class="aa-section-label">This Month</span>
            </div>
            <div class="aa-grid">
                <div class="aa-card">
                    <div class="aa-value" id="aa-month-visitors">—</div>
                    <div class="aa-card-label">Visitors</div>
                </div>
                <div class="aa-card">
                    <div class="aa-value" id="aa-month-music">—</div>
                    <div class="aa-card-label">Music Plays</div>
                </div>
            </div>
        </div>

        <!-- ALL TIME ───────────────────────────────────────────────────── -->
        <div class="aa-section">
            <div class="aa-section-header">
                <span class="aa-section-label">All Time</span>
            </div>
            <div class="aa-grid">
                <div class="aa-card">
                    <div class="aa-value" id="aa-all-visitors">—</div>
                    <div class="aa-card-label">Visitors</div>
                </div>
                <div class="aa-card">
                    <div class="aa-value" id="aa-all-music">—</div>
                    <div class="aa-card-label">Music Plays</div>
                </div>
            </div>
        </div>

        <!-- POPULAR ────────────────────────────────────────────────────── -->
        <div class="aa-section">
            <div class="aa-section-header">
                <span class="aa-section-label">Popular</span>
            </div>
            <div class="aa-grid">
                <div class="aa-card aa-card--list aa-card--wide">
                    <div class="aa-card-title">人気曲 TOP 5</div>
                    <div id="aa-top-tracks"></div>
                </div>
                <div class="aa-card aa-card--list aa-card--wide">
                    <div class="aa-card-title">人気ページ TOP 5</div>
                    <div id="aa-top-pages"></div>
                </div>
            </div>
        </div>

    </div><!-- /#aa-content -->

    <div class="admin-footer">
        <a href="/afterhours" class="back-home">← Back</a>
        <button class="admin-signout" id="signout-btn">Sign out</button>
    </div>
</div>

<script src="/whale.js"></script>
<script src="/script.js?v=2"></script>
<script src="/admin.js?v=3"></script>
<script src="/analytics-overview.js"></script>

</body>
</html>
