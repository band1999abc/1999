<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diary | 1999</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap">
    <link rel="stylesheet" href="style.css?v=13">
</head>
<body>

<div class="card">
    <img src="whale_transparent.png" class="whale-bg" alt="">

    <h1>Diary</h1>

    <div class="sub">Small notes.</div>

    <div id="diary-list">
        <!-- populated by JS -->
    </div>

    <nav>
        <a href="index.html">← Home</a>
    </nav>

    <footer>©1999</footer>

</div>

<script src="script.js?v=2"></script>
<script src="whale.js"></script>
<script>
(function () {
    'use strict';

    var listEl = document.getElementById('diary-list');

    // YYYY-MM-DD → YYYY.MM.DD (validates format; returns '' if unexpected)
    function fmtDate(iso) {
        if (!iso || !/^\d{4}-\d{2}-\d{2}$/.test(iso)) return '';
        return iso.replace(/-/g, '.');
    }

    function escHtml(s) {
        return String(s || '')
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;');
    }

    function bodyToHtml(text) {
        return escHtml(text).replace(/\n/g, '<br>');
    }

    // Append a text node to el and return it (safe, no innerHTML)
    function appendText(el, tag, text, cls) {
        var child = document.createElement(tag);
        if (cls) child.className = cls;
        child.textContent = text;
        el.appendChild(child);
        return child;
    }

    function render(posts) {
        listEl.innerHTML = '';
        if (!posts || !posts.length) {
            var empty = document.createElement('div');
            empty.className = 'diary-entry';
            var ep = document.createElement('p');
            ep.style.cssText = 'color:var(--text-muted);font-size:14px;';
            ep.textContent = 'まだ投稿がありません。';
            empty.appendChild(ep);
            listEl.appendChild(empty);
            return;
        }
        posts.forEach(function (p, i) {
            var entry = document.createElement('div');
            entry.className = 'diary-entry';

            appendText(entry, 'div', fmtDate(p.date), 'diary-date');

            if (p.title) {
                appendText(entry, 'div', p.title, 'diary-entry-title');
            }

            // body: safe multi-line render via <br> nodes
            var bodyEl2 = document.createElement('p');
            var lines = String(p.body || '').split('\n');
            lines.forEach(function (line, li) {
                bodyEl2.appendChild(document.createTextNode(line));
                if (li < lines.length - 1) {
                    bodyEl2.appendChild(document.createElement('br'));
                }
            });
            entry.appendChild(bodyEl2);
            listEl.appendChild(entry);

            if (i < posts.length - 1) {
                var div = document.createElement('div');
                div.className = 'diary-divider';
                listEl.appendChild(div);
            }
        });
    }

    fetch('/api/diary')
        .then(function (r) { return r.json(); })
        .then(render)
        .catch(function () {
            listEl.innerHTML =
                '<div class="diary-entry"><p style="color:var(--text-muted);font-size:14px;">読み込みに失敗しました。</p></div>';
        });
}());
</script>

</body>
</html>
