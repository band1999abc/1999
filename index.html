<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>1999</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#efe8de;
    color:#4a433d;
    font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:40px;
}

.card{
    background:white;
    max-width:520px;
    width:100%;
    padding:48px;
    border-radius:24px;
    box-shadow:0 10px 30px rgba(0,0,0,.08);
}

h1{
    font-size:48px;
    margin-bottom:12px;
    font-weight:600;
}

.message{
    color:#777;
    line-height:1.8;
    margin-bottom:40px;
}

nav a{
    display:block;
    color:#4a433d;
    text-decoration:none;
    padding:12px 0;
    border-bottom:1px solid #ece6df;
    transition:.3s;
}

nav a:hover{
    padding-left:12px;
    color:#8a6b47;
}

footer{
    margin-top:40px;
    color:#999;
    font-size:14px;
}

</style>

</head>

<body>

<div class="card">

<h1>1999</h1>

<p class="message">
Welcome.<br><br>
好きなように過ごしてください。<br><br>
一緒に歌ってもいいし、<br>
コーヒーを飲みながら眺めるだけでも。
</p>

<nav>
<a href="#">🎵 Music</a>
<a href="#">☕ Diary</a>
<a href="#">👥 Members</a>
<a href="#">✉ Contact</a>
</nav>

<footer>
©1999
</footer>

</div>

</body>
</html>
