<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>1999</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#efe8de;
    font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",sans-serif;
    color:#444;

    display:flex;
    justify-content:center;
    align-items:center;

    min-height:100vh;
}

.card{

    width:min(90%,520px);

    background:white;

    border-radius:24px;

    padding:48px;

    box-shadow:
    0 15px 40px rgba(0,0,0,.08);

    animation:fade 1s ease;
}

h1{
    font-size:64px;
    margin-bottom:18px;
    font-weight:700;
}

.sub{
    color:#777;
    margin-bottom:40px;
}

p{
    line-height:2;
    margin-bottom:18px;
}

nav{
    margin-top:50px;
}

nav a{

    display:block;

    text-decoration:none;

    color:#444;

    padding:14px 0;

    border-bottom:1px solid #ececec;

    transition:.3s;
}

nav a:hover{

    color:#8b6f47;

    padding-left:12px;

}

footer{

    margin-top:45px;

    color:#999;

    font-size:14px;

}

@keyframes fade{

from{

opacity:0;
transform:translateY(20px);

}

to{

opacity:1;
transform:translateY(0);

}

}

</style>

</head>

<body>

<div class="card">

<h1>1999</h1>

<div class="sub">
Welcome.
</div>

<p>
好きなように過ごしてください。
</p>

<p>

</p>

<p>

</p>

</nav>

<footer>

</footer>

</div>

</body>
</html>
